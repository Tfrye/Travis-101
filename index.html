<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travis 101</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{width:100%;height:100%;overflow:hidden}
    button{font-family:inherit}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(245,240,232,0.13);border-radius:3px}
    @keyframes floatBounce{0%,100%{transform:translateY(0) scale(1)}33%{transform:translateY(-12px) scale(1.03)}66%{transform:translateY(6px) scale(0.97)}}
    @keyframes sparkle{0%,100%{opacity:0;transform:scale(0) rotate(0deg)}50%{opacity:1;transform:scale(1) rotate(180deg)}}
    @keyframes slideUpBounce{0%{opacity:0;transform:translateY(60px) scale(0.9)}60%{opacity:1;transform:translateY(-8px) scale(1.02)}100%{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes pulse{0%,100%{box-shadow:0 4px 30px rgba(45,109,181,0.27)}50%{box-shadow:0 4px 40px rgba(45,109,181,0.53)}}
    @keyframes popIn{0%{opacity:0;transform:scale(0.9) translateY(10px)}60%{opacity:1;transform:scale(1.02) translateY(-2px)}100%{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes wiggle{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-3deg)}75%{transform:rotate(3deg)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const P = {
  navy:"#0F1F3D", navyLight:"#1A2E52", blue:"#1B4F8A", blueLight:"#2D6DB5",
  teal:"#0E6B74", tealLight:"#1A8C97", gold:"#C8922A", goldLight:"#E8B84B",
  sage:"#4A7C59", sageLight:"#6BA07A", warm:"#8B5E3C", warmLight:"#B07E55",
  cream:"#F5F0E8", creamDark:"#E8DFD2", coral:"#C0533E", white:"#FEFCF9",
};

const FloatingOrb = ({ size, color, top, left, delay, duration=6 }) => (
  <div style={{ position:"absolute", width:size, height:size, borderRadius:"50%",
    background:`radial-gradient(circle at 30% 30%, ${color}66, ${color}18)`,
    top, left, animation:`floatBounce ${duration}s ease-in-out ${delay}s infinite`,
    pointerEvents:"none", filter:"blur(1px)" }} />
);
const Sparkle = ({ top, left, delay, size=8 }) => (
  <div style={{ position:"absolute", top, left, width:size, height:size,
    animation:`sparkle 2.8s ease-in-out ${delay}s infinite`, pointerEvents:"none" }}>
    <svg viewBox="0 0 20 20" width={size} height={size}>
      <path d="M10 0 L12 8 L20 10 L12 12 L10 20 L8 12 L0 10 L8 8 Z" fill="#E8B84B"/>
    </svg>
  </div>
);
const ProgressDots = ({ current, total, onNav }) => (
  <div style={{ display:"flex", gap:10, justifyContent:"center", padding:"10px 0 8px" }}>
    {Array.from({length:total}).map((_,i) => (
      <button key={i} onClick={()=>onNav(i)}
        style={{ width:i===current?36:14, height:14, borderRadius:7, border:"none",
          background:i===current?"#E8B84B":"rgba(245,240,232,0.27)", cursor:"pointer",
          transition:"all 0.4s cubic-bezier(0.34,1.56,0.64,1)" }} />
    ))}
  </div>
);
const Screen = ({ children, isActive, bg }) => (
  <div style={{ position:"absolute", inset:0,
    background:bg||"linear-gradient(160deg,#0F1F3D 0%,#1A2E52 50%,rgba(27,79,138,0.53) 100%)",
    opacity:isActive?1:0, transform:isActive?"scale(1)":"scale(0.96)",
    transition:"opacity 0.5s ease, transform 0.5s cubic-bezier(0.34,1.56,0.64,1)",
    pointerEvents:isActive?"auto":"none", overflow:"hidden", display:"flex", flexDirection:"column" }}>
    {children}
  </div>
);
const ScrollArea = ({ children, style }) => (
  <div style={{ flex:1, overflowY:"auto", overflowX:"hidden",
    WebkitOverflowScrolling:"touch", paddingBottom:56, ...style }}>
    {children}
  </div>
);
const Badge = ({ label, color }) => (
  <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:11, fontWeight:700,
    color, background:`${color}22`, padding:"2px 9px", borderRadius:50,
    letterSpacing:"0.04em", flexShrink:0 }}>{label}</span>
);
const Eyebrow = ({ children, color }) => (
  <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, letterSpacing:"0.2em",
    textTransform:"uppercase", color:color||"#E8B84B", marginBottom:6 }}>{children}</div>
);

const CoverScreen = ({ isActive, onStart }) => {
  const [showTag, setShowTag] = useState(false);
  const [showCTA, setShowCTA] = useState(false);
  useEffect(() => {
    if (!isActive) return;
    setShowTag(false); setShowCTA(false);
    const t1=setTimeout(()=>setShowTag(true),800);
    const t2=setTimeout(()=>setShowCTA(true),1600);
    return()=>{clearTimeout(t1);clearTimeout(t2);};
  }, [isActive]);
  return (
    <Screen isActive={isActive}>
      <FloatingOrb size={180} color={P.blueLight} top="-40px" left="-50px" delay={0} duration={8}/>
      <FloatingOrb size={120} color={P.gold} top="58%" left="72%" delay={1} duration={7}/>
      <FloatingOrb size={90} color={P.sage} top="28%" left="82%" delay={2} duration={9}/>
      <FloatingOrb size={140} color={P.teal} top="72%" left="-20px" delay={0.5} duration={6}/>
      <Sparkle top="15%" left="68%" delay={0} size={12}/>
      <Sparkle top="38%" left="18%" delay={0.8} size={8}/>
      <Sparkle top="62%" left="58%" delay={1.6} size={10}/>
      <Sparkle top="24%" left="44%" delay={2.2} size={6}/>
      <Sparkle top="78%" left="34%" delay={0.4} size={9}/>
      <div style={{ flex:1, display:"flex", flexDirection:"column", justifyContent:"center",
        alignItems:"center", padding:"32px 20px", position:"relative", zIndex:10 }}>
        <div style={{ fontFamily:"'Playfair Display',Georgia,serif",
          fontSize:"clamp(60px,15vw,150px)", fontWeight:300, color:P.cream,
          letterSpacing:"-0.03em", lineHeight:0.9, textAlign:"center",
          animation:isActive?"slideUpBounce 1s cubic-bezier(0.34,1.56,0.64,1) forwards":"none" }}>
          Travis
        </div>
        <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:"clamp(13px,3vw,18px)",
          color:P.goldLight, letterSpacing:"0.1em", textTransform:"uppercase", marginTop:20,
          opacity:showTag?1:0, transform:showTag?"translateY(0)":"translateY(20px)",
          transition:"all 0.8s cubic-bezier(0.34,1.56,0.64,1)", textAlign:"center", maxWidth:340 }}>
          Fact Finder. Follow-Thru. Supporter.<br/>A field guide to working with Travis.
        </div>
        <button onClick={onStart} style={{ marginTop:40, padding:"14px 40px",
          background:`linear-gradient(135deg,${P.blueLight},${P.teal})`,
          border:"none", borderRadius:50, color:P.white,
          fontFamily:"'DM Sans',sans-serif", fontSize:17, fontWeight:600,
          letterSpacing:"0.06em", cursor:"pointer",
          opacity:showCTA?1:0, transform:showCTA?"translateY(0) scale(1)":"translateY(20px) scale(0.9)",
          transition:"all 0.6s cubic-bezier(0.34,1.56,0.64,1)",
          animation:showCTA?"pulse 2.5s ease-in-out infinite":"none",
          boxShadow:`0 4px 30px ${P.blueLight}55` }}>Begin →</button>
        <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, color:"rgba(245,240,232,0.47)",
          marginTop:14, opacity:showCTA?1:0, transition:"opacity 0.6s ease 0.3s",
          letterSpacing:"0.08em" }}>3 min read · click dots to navigate</div>
        <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:12, color:"rgba(245,240,232,0.27)",
          marginTop:18, opacity:showCTA?1:0, transition:"opacity 0.6s ease 0.5s",
          textAlign:"center", lineHeight:1.6, maxWidth:300 }}>
          Built on <span style={{ color:P.goldLight }}>KOLBE A™ Index</span> + <span style={{ color:P.goldLight }}>DISC</span> —
          two frameworks that map how Travis takes action and how he engages people.
        </div>
      </div>
    </Screen>
  );
};

const KolbeScreen = ({ isActive }) => {
  const [active, setActive] = useState(null);
  const [entered, setEntered] = useState(false);
  useEffect(() => {
    if (isActive){const t=setTimeout(()=>setEntered(true),300);return()=>clearTimeout(t);}
    setEntered(false);setActive(null);
  }, [isActive]);
  const modes = [
  { id:"ff", label:"Fact Finder", score:7, color:P.blueLight, zone:"Accommodate",
    bar:"Gathers information thoroughly before acting. Seeks context, background, and detail — not to stall, but to move with confidence.",
    detail:"A 7 means research and inquiry are core to how Travis operates. He asks good questions, digs into the details, and wants to understand the full picture before committing. The upside: his decisions are well-grounded. The watch-out: he may keep gathering past the point of diminishing returns." },
  { id:"ft", label:"Follow Thru", score:8, color:P.teal, zone:"Initiate",
    bar:"His strongest mode. Naturally builds systems, establishes order, and sees things through — consistency and structure come instinctively.",
    detail:"An 8 means Follow Thru is the engine. Travis organizes naturally, creates process where there isn't one, and follows through on commitments reliably. He works best when there's a clear structure to build within or improve — and he'll often create that structure himself if it doesn't exist." },
  { id:"qs", label:"Quick Start", score:2, color:P.warm, zone:"Prevent",
    bar:"Resists acting before thinking. Prefers a plan over a pivot — improvisation and rapid-fire change are draining, not energizing.",
    detail:"A 2 means Travis prevents impulsive risk — he's a stabilizing force when others want to move fast without a plan. He'll ask the question nobody else thought to ask. The tension: in fast-moving environments, his deliberate pace can read as hesitation. It isn't — it's due diligence." },
  { id:"imp", label:"Implementor", score:3, color:P.sage, zone:"Resist",
    bar:"Works in the abstract. Ideas, systems, and frameworks are his medium — not physical or hands-on execution.",
    detail:"A 3 means tangible, hands-on building isn't where Travis naturally operates. He thinks in concepts, frameworks, and structure. Give him a problem to think through or a system to design — not a prototype to build or a tool to fix." },
];
  return (
    <Screen isActive={isActive} bg={`linear-gradient(160deg,${P.navy} 0%,${P.navyLight} 60%,${P.blue}55 100%)`}>
      <ScrollArea>
        <div style={{ padding:"36px 20px 10px" }}>
          <Eyebrow>KOLBE A™ Index</Eyebrow>
          <div style={{ fontFamily:"'Playfair Display',Georgia,serif",
            fontSize:"clamp(26px,6vw,36px)", fontWeight:400, color:P.cream, lineHeight:1.15 }}>
            How he's wired<br/><span style={{ color:P.tealLight, fontStyle:"italic" }}>to take action</span>
          </div>
          <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:15, color:"rgba(245,240,232,0.67)",
            marginTop:8, lineHeight:1.55, maxWidth:400 }}>
            KOLBE measures natural instincts — not personality, not skills.
            Tap any bar to read what Travis's score actually means.
          </div>
        </div>
        <div style={{ padding:"10px 20px 16px", display:"flex", flexDirection:"column", gap:10 }}>
          {modes.map((m,i) => {
            const isOpen=active===m.id;
            return (
              <button key={m.id} onClick={()=>setActive(isOpen?null:m.id)}
                style={{ textAlign:"left", background:isOpen?`${m.color}22`:"rgba(245,240,232,0.04)",
                  border:`1px solid ${isOpen?m.color+"66":"rgba(245,240,232,0.06)"}`,
                  borderRadius:16, padding:"14px 16px", cursor:"pointer",
                  opacity:entered?1:0, transform:entered?"translateX(0)":"translateX(-30px)",
                  transition:`all 0.5s cubic-bezier(0.34,1.56,0.64,1) ${i*0.1}s` }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                    <span style={{ fontSize:16, fontWeight:700, color:P.cream }}>{m.label}</span>
                    <Badge label={m.zone} color={m.color}/>
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
                    <span style={{ fontSize:24, fontWeight:300, color:m.color,
                      fontFamily:"'Playfair Display',serif" }}>{m.score}</span>
                    <span style={{ fontSize:18, color:m.color,
                      display:"inline-block",
                      transform:isOpen?"rotate(45deg)":"rotate(0deg)",
                      transition:"transform 0.3s cubic-bezier(0.34,1.56,0.64,1)" }}>+</span>
                  </div>
                </div>
                <div style={{ height:7, borderRadius:4, background:"rgba(245,240,232,0.1)", overflow:"hidden" }}>
                  <div style={{ height:"100%", width:entered?`${(m.score/10)*100}%`:"0%", borderRadius:4,
                    background:`linear-gradient(90deg,${m.color}88,${m.color})`,
                    transition:`width 1s cubic-bezier(0.34,1.56,0.64,1) ${0.3+i*0.15}s` }}/>
                </div>
                <div style={{ fontSize:14, color:"rgba(245,240,232,0.53)", marginTop:7, lineHeight:1.55 }}>{m.bar}</div>
                {isOpen && (
                  <div style={{ animation:"popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)",
                    marginTop:10, paddingTop:10, borderTop:"1px solid rgba(245,240,232,0.06)" }}>
                    <div style={{ fontSize:14, color:"rgba(245,240,232,0.8)", lineHeight:1.65 }}>{m.detail}</div>
                  </div>
                )}
              </button>
            );
          })}
          <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, color:"rgba(245,240,232,0.33)",
            textAlign:"center", marginTop:4, fontStyle:"italic",
            opacity:entered?1:0, transition:"opacity 0.6s ease 0.6s" }}>
            Scores: 1–3 Prevent · 4–6 Accommodate · 7–10 Initiate
          </div>
        </div>
      </ScrollArea>
      <FloatingOrb size={80} color={P.teal} top="14%" left="80%" delay={0} duration={7}/>
    </Screen>
  );
};

const DiscScreen = ({ isActive }) => {
  const [entered, setEntered] = useState(false);
  useEffect(() => {
    if (isActive){const t=setTimeout(()=>setEntered(true),300);return()=>clearTimeout(t);}
    setEntered(false);
  }, [isActive]);
  const traits = [
    { icon:"🏔️", label:"Steady & Reliable", color:P.tealLight,
      desc:"He's the anchor in the room. While others react to noise, he's processing, staying grounded, and keeping the work moving. Teams trust him because he never burns the place down." },
    { icon:"🎧", label:"Deep Listener", color:P.sageLight,
      desc:"He absorbs what others say — tone, subtext, what's NOT being said. People feel genuinely heard around Travis. This is rarer than most people realize." },
    { icon:"🤝", label:"Relationship-First", color:P.goldLight,
      desc:"He builds trust through consistency over time, not charm in the moment. His relationships are earned and they run deep. He'll go the extra mile for people he's loyal to." },
    { icon:"📐", label:"Thoughtful Executor", color:P.blueLight,
      desc:"He doesn't just do things — he does them right. Follow Thru 8 + DISC S is a rare combination: he cares deeply about both the quality of the relationship and the quality of the deliverable." },
  ];
  return (
    <Screen isActive={isActive} bg={`linear-gradient(160deg,${P.navyLight} 0%,${P.navy} 50%,${P.teal}44 100%)`}>
      <ScrollArea>
        <div style={{ padding:"36px 20px 10px" }}>
          <Eyebrow>DISC · Supporter</Eyebrow>
          <div style={{ fontFamily:"'Playfair Display',Georgia,serif",
            fontSize:"clamp(26px,6vw,36px)", fontWeight:400, color:P.cream, lineHeight:1.15 }}>
            The quiet engine<br/><span style={{ color:P.sageLight, fontStyle:"italic" }}>he makes the room work better than it knows</span>
          </div>
          <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:15, color:"rgba(245,240,232,0.67)",
            marginTop:8, lineHeight:1.55, maxWidth:400 }}>
            Steady, thoughtful, accommodating. Travis isn't the loudest voice in the room —
            he makes the room work better than it knows.
          </div>
        </div>
        <div style={{ padding:"8px 20px 16px", display:"flex", flexDirection:"column", gap:12 }}>
          {traits.map((t,i) => (
            <div key={t.label} style={{ background:"rgba(245,240,232,0.04)", border:`1px solid ${t.color}22`,
              borderRadius:18, padding:"16px", display:"flex", gap:14, alignItems:"flex-start",
              opacity:entered?1:0, transform:entered?"translateX(0)":"translateX(-40px)",
              transition:`all 0.6s cubic-bezier(0.34,1.56,0.64,1) ${i*0.12}s` }}>
              <div style={{ width:46, height:46, borderRadius:12, background:`${t.color}18`,
                display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, flexShrink:0,
                animation:entered?`wiggle 4s ease-in-out ${i*0.4}s infinite`:"none" }}>{t.icon}</div>
              <div style={{ minWidth:0 }}>
                <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:16, fontWeight:700,
                  color:P.cream, marginBottom:6 }}>{t.label}</div>
                <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:14,
                  color:"rgba(245,240,232,0.67)", lineHeight:1.65 }}>{t.desc}</div>
              </div>
            </div>
          ))}
          <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:14, color:P.goldLight,
            textAlign:"center", fontStyle:"italic", marginTop:4,
            opacity:entered?1:0, transition:"opacity 0.6s ease 0.6s" }}>
            High FF + High FT + DISC S = does the deep work, builds the system, never drops the ball.
          </div>
        </div>
      </ScrollArea>
      <FloatingOrb size={90} color={P.sage} top="15%" left="78%" delay={0} duration={8}/>
    </Screen>
  );
};

const BlindSpotsScreen = ({ isActive }) => {
  const [entered, setEntered] = useState(false);
  const [flipped, setFlipped] = useState(null);
  useEffect(() => {
    if (isActive){const t=setTimeout(()=>setEntered(true),300);return()=>clearTimeout(t);}
    setEntered(false);setFlipped(null);
  }, [isActive]);
  const spots = [
    { icon:"🧱", label:"The Invisible Wall", source:"DISC S + Follow Thru 8", color:P.blueLight,
      cost:"Travis absorbs everything and shows very little friction. Problems get internalized, frustrations go unsaid, and pressure builds behind a very composed exterior — until it doesn't.",
      antidote:"Name it before it compounds. 'I'm carrying a lot right now' is a complete sentence. People can't help with what they can't see." },
    { icon:"📚", label:"The Research Loop", source:"Fact Finder 7", color:P.gold,
      cost:"He can get stuck gathering information past the point of diminishing returns. The instinct to be thorough is right — the timing can be off when speed matters more than precision.",
      antidote:"Set a 'good enough to move' threshold before starting. Ask: what does he need to know to make a 70% confident decision? Stop there." },
    { icon:"⚠️", label:"The Quiet Yes", source:"DISC S (Accommodating)", color:P.coral,
      cost:"He says yes — or doesn't say no — to keep things smooth. Then he's overcommitted and under-resourced, doing great work on too many fronts and absorbing the cost personally.",
      antidote:"The pause before yes is professional, not rude. 'Let me check what I'm already carrying' is a complete response that buys him real time." },
    { icon:"🐢", label:"The Slow Ignition", source:"Quick Start 2", color:P.warm,
      cost:"He's not slow — he's deliberate. But in fast-moving environments, the pause to plan can look like reluctance, especially to high Quick Starts around him.",
      antidote:"Narrate the process out loud. 'I want to make sure I understand the full picture before I commit' signals intent, not hesitation." },
  ];
  return (
    <Screen isActive={isActive} bg={`linear-gradient(160deg,${P.navy} 0%,${P.navyLight} 100%)`}>
      <div style={{ padding:"36px 20px 10px", flexShrink:0 }}>
        <Eyebrow color={P.coral}>The Blind Spots</Eyebrow>
        <div style={{ fontFamily:"'Playfair Display',Georgia,serif",
          fontSize:"clamp(26px,6vw,36px)", fontWeight:400, color:P.cream, lineHeight:1.15 }}>
          Yeah, but here's<br/><span style={{ color:P.coral, fontStyle:"italic" }}>what that costs him</span>
        </div>
        <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:15, color:"rgba(245,240,232,0.67)",
          marginTop:8, lineHeight:1.55, maxWidth:400 }}>
          Every strength has a shadow. These are his. Tap any card to see the antidote.
        </div>
      </div>
      <ScrollArea style={{ padding:"8px 20px 0" }}>
        {spots.map((s,i) => {
          const isOpen=flipped===i;
          return (
            <button key={s.label} onClick={()=>setFlipped(isOpen?null:i)}
              style={{ width:"100%", textAlign:"left", marginBottom:10,
                background:isOpen?`${s.color}18`:"rgba(245,240,232,0.03)",
                border:`1px solid ${isOpen?s.color+"55":"rgba(245,240,232,0.06)"}`,
                borderRadius:16, padding:"14px 16px", cursor:"pointer",
                opacity:entered?1:0, transform:entered?"translateY(0)":"translateY(20px)",
                transition:`all 0.5s cubic-bezier(0.34,1.56,0.64,1) ${i*0.1}s` }}>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <div style={{ width:42, height:42, borderRadius:10, background:`${s.color}18`,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  fontSize:20, flexShrink:0 }}>{s.icon}</div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                    <span style={{ fontSize:15, fontWeight:700, color:P.cream }}>{s.label}</span>
                    <Badge label={s.source} color={s.color}/>
                  </div>
                </div>
                <span style={{ fontSize:18, color:s.color, flexShrink:0, display:"inline-block",
                  transform:isOpen?"rotate(45deg)":"rotate(0deg)",
                  transition:"transform 0.3s cubic-bezier(0.34,1.56,0.64,1)" }}>+</span>
              </div>
              {isOpen && (
                <div style={{ animation:"popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)", marginTop:12, paddingLeft:54 }}>
                  <div style={{ fontSize:14, color:"rgba(245,240,232,0.73)", lineHeight:1.65 }}>{s.cost}</div>
                  <div style={{ fontSize:14, color:P.sageLight, lineHeight:1.6, marginTop:8,
                    paddingTop:8, borderTop:"1px solid rgba(245,240,232,0.06)", fontStyle:"italic" }}>
                    💊 {s.antidote}
                  </div>
                </div>
              )}
            </button>
          );
        })}
        <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, color:"rgba(245,240,232,0.33)",
          textAlign:"center", marginTop:4, marginBottom:8, lineHeight:1.5, fontStyle:"italic" }}>
          Self-awareness isn't self-fixing. These are ongoing — name them when they show up.
        </div>

function App() {
  const [screen, setScreen] = useState(0);
  const TOTAL = 9;
  const touchRef = useRef({ startX:0, startY:0, startTime:0, locked:null });
  const goTo = useCallback(s => { if (s>=0&&s<TOTAL) setScreen(s); }, []);

  useEffect(() => {
    const h = e => {
      if (e.key==="ArrowRight"||e.key==="ArrowDown") goTo(screen+1);
      if (e.key==="ArrowLeft"||e.key==="ArrowUp") goTo(screen-1);
    };
    window.addEventListener("keydown",h);
    return ()=>window.removeEventListener("keydown",h);
  }, [screen, goTo]);

  const onTouchStart = useCallback(e => {
    const t=e.touches[0];
    touchRef.current={ startX:t.clientX, startY:t.clientY, startTime:Date.now(), locked:null };
  },[]);
  const onTouchMove = useCallback(e => {
    const t=e.touches[0];
    const { startX, startY, locked }=touchRef.current;
    const dx=t.clientX-startX, dy=t.clientY-startY;
    if (locked===null) touchRef.current.locked=Math.abs(dx)>Math.abs(dy)?"h":"v";
    if (touchRef.current.locked==="h") e.preventDefault();
  },[]);
  const onTouchEnd = useCallback(e => {
    const t=e.changedTouches[0];
    const { startX, startTime, locked }=touchRef.current;
    const dx=t.clientX-startX, dt=Date.now()-startTime;
    if (locked==="h"&&Math.abs(dx)>40&&dt<500){ if(dx<0)goTo(screen+1); else goTo(screen-1); }
  },[screen,goTo]);

  return (
    <div onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
      style={{ width:"100%", height:"100vh", position:"relative", overflow:"hidden",
        background:P.navy, fontFamily:"'DM Sans',sans-serif", touchAction:"none", userSelect:"none" }}>
      <CoverScreen      isActive={screen===0} onStart={()=>goTo(1)}/>
      <KolbeScreen      isActive={screen===1}/>
      <DiscScreen       isActive={screen===2}/>
      <BlindSpotsScreen isActive={screen===3}/>
      <ConnectorScreen  isActive={screen===4}/>
      <UserManualScreen isActive={screen===5}/>
      <DecoderScreen    isActive={screen===6}/>
      <CheatSheetScreen isActive={screen===7}/>
      <CloseScreen      isActive={screen===8} onRestart={()=>goTo(0)}/>
      <div style={{ position:"absolute", bottom:0, left:0, right:0, zIndex:30,
        background:"linear-gradient(transparent,rgba(15,31,61,0.8) 40%)", paddingTop:20, paddingBottom:8 }}>
        {screen>0&&screen<TOTAL-1&&(
          <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:11, color:"rgba(245,240,232,0.27)",
            textAlign:"center", letterSpacing:"0.1em", marginBottom:6 }}>click to navigate</div>
        )}
        <ProgressDots current={screen} total={TOTAL} onNav={goTo}/>
      </div>
    </div>
  );
}
